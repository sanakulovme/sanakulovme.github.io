<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 46</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            background: rgba(41, 52, 98);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .col{
        	width: 200px;
        	height: 200px;
        	border-radius: 50%;
        	background: #fff1c1;
        	overflow: hidden;
        }
        .sm1{
        	width: 150px;
        	height: 150px;
        	background: #fe5f55;
        	transform: rotate(45deg);
        	position: relative;
        	left: 66px;
        	top: 90px;
        }
        .sm2{
        	width: 100px;
        	height: 100px;
        	transform: rotate(45deg);
			background: #fe5f55;
			position: relative;
			left: -20px;
        }
	</style>
</head>
<body>

	<div class="container">
		<div class="box">
			<div class="col">
				<div class="sm1"></div>
				<div class="sm2"></div>
			</div>
		</div>
	</div>

</body>
</html>
