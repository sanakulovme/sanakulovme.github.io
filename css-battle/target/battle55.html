<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 55</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        :root{
        	--aqua: #4f77ff;
        	--box: #191919;
        	--yellow: #f9e492;
        }
        .container{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            z-index: 2;
            background: var(--box);
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .col{
        	width: 200px;
        	height: 200px;
        	/*border: 1px solid #000;*/
        	display: flex;
        }
        .b1{
        	width: 100px;
        	height: 50px;
        	background: var(--yellow);
        	border-top-left-radius: 100px;
        	border-top-right-radius: 100px;
        	position: relative;
        	top: 50px;
        }
        .b2{
        	width: 50px;
        	height: 100px;
        	background: var(--aqua);
        	border-top-left-radius: 100px;
        	border-bottom-left-radius: 100px;
        	position: relative;
        	top: 50px;
        	left: 50px;
        }

        .b3{
        	width: 50px;
        	height: 100px;
        	background: var(--aqua);
        	border-top-right-radius: 100px;
        	border-bottom-right-radius: 100px;
        }
        .b4{
        	width: 100px;
        	height: 50px;
        	background: var(--yellow);
        	border-bottom-right-radius: 100px;
        	border-bottom-left-radius: 100px;
        	position: relative;
        }
	</style>
</head>
<body>

	<div class="container">
		<div class="box">
			<div class="col">
				<div class="col1">
					<div class="b1"></div>
					<div class="b2"></div>
				</div>
				<div class="col2">
					<div class="b3"></div>
					<div class="b4"></div>
				</div>
			</div>
		</div>
	</div>

</body>
</html>
