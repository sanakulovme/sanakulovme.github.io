<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 49</title>
	<style>
		/*
		#243d83 - kuk
		#eeb850 - yellow
		 */
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            background: #6592cf;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .sm{
        	width: 200px;
        	height: 200px;
        }
        .top{
        	width: 200px;
        	height: 100px;
        	display: flex;
        	justify-content: center;
        	overflow: hidden;
        }
        .t{
        	width: 150px;
        	height: 150px;
        	transform: rotate(45deg);
        	position: relative;
        	top: 30px;
        	background: #243d83;
        }
        .bottom{
        	width: 200px;
        	height: 100px;
        	display: flex;
        	justify-content: center;
        }
        .bottom_box{
        	width: 150px;
        	height: 100px;
        	background: #243d83;
        	border-bottom-right-radius: 10px;
        	border-bottom-left-radius: 10px;
        	display: flex;
        	justify-content: space-between;
        	align-items: center;
        	flex-direction: column;
        }
        .p{
        	width: 100px;
        	height: 10px;
        	background: #eeb850;
        	border-radius: 10px;
        	position: relative;
        	top: -5px;
        	z-index: 999;
        }
        .b{
        	width: 50px;
        	height: 50px;
        	background: #eeb850;
        	border-top-left-radius: 10px;
        	border-top-right-radius: 10px;
        }
	</style>
</head>
<body>

	<div class="container">
		<div class="box">
			<div class="sm">
				<div class="top">
					<div class="t"></div>
				</div>
				<div class="bottom">
					<div class="bottom_box">
						<div class="p"></div>
						<div class="b"></div>
					</div>
				</div>
			</div>
		</div>
	</div>

</body>
</html>
