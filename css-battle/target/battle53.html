<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 53</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        :root{
        	--box: #191919;
        	--aqua0_5: #9ad5ff;
        	--aqua: #4f77ff;
        	--yellow: #f9e492;
        }
        .container{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            z-index: 2;
            background: var(--box);
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .col{
        	width: 150px;
        	height: 200px;
        	/*border: 1px solid #000;*/
        	position: relative;
        }
        .col1{
        	width: 75px;
        	height: 126px;
        	background: var(--yellow);
        	position: absolute;
        	bottom: 0;
        	left: 0;
        	overflow: hidden;
        }
        .col2{
        	width: 150px;
        	height: 150px;
        	border-radius: 50%;
        	background: var(--aqua);
        	position: absolute;
        	top: 0;
        	right: 0;
        }
        .s{
        	width: 150px;
        	height: 150px;
        	border-radius: 50%;
        	background: var(--aqua0_5);
        	position: relative;
        	top: -75px;
        	left: 0;
        	z-index: 55;
        }
	</style>
</head>
<body>

	<div class="container">
		<div class="box">
			<div class="col">
				<div class="col1">
					<div class="s"></div>
				</div>
				<div class="col2"></div>
			</div>
		</div>
	</div>


</body>
</html>
