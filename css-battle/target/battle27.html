<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 27</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .contaiener{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            background: rgba(227, 143, 102);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .sm{
        	width: 200px;
			height: 200px;
			border-radius: 50%;
            background: rgba(170, 68, 95);
			display: flex;
            justify-content: center;
            align-items: center;
			overflow: hidden;
        }
        .border{
        	width: 140px;
        	height: 140px;
        	border-radius: 50%;
            background: rgba(170, 68, 95);
			border: 1px solid rgba(247, 236, 125);
			border-width: 30px;
			position: relative;
        }
        .not1{
        	width: 100px;
        	height: 100px;
        	position: absolute;
            background: rgba(170, 68, 95);
        	left: 40px;
        	top: 40px;
        }
        .not2{
        	width: 100px;
        	height: 100px;
        	position: absolute;
            background: rgba(170, 68, 95);
        	left: -60px;
        	top: -60px;
        }
	</style>
</head>
<body>

	<div class="contaiener">
		<div class="box">
			<div class="sm">
				<div class="border">
					<div class="not1"></div>
					<div class="not2"></div>
				</div>
			</div>
		</div>
	</div>

</body>
</html>
