<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 23</title>
	<style>
		*{
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		.container{
			width: 100%;
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			background: #555;
		}
		.box{
			width: 400px;
			height: 300px;
			background: rgb(243, 172, 60);
			display: flex;
			justify-content: center;
			align-items: center;
		}
		.box2{
			width: 200px;
			height: 200px;
			background: rgba(26, 67, 65);
			position: relative;
		}
		.box3{
			width: 100px;
			height: 100px;
			background: rgb(153,130,53);
			position: absolute;
			left: 0;
			bottom: 0;
		}
		.box4{
			width: 50px;
			height: 50px;
			background: rgb(243, 172, 60);
			position: absolute;
			right: 0;
			bottom: 0;
		}
	</style>
</head>
<body>

	<div class="container">
		<div class="box">
			<div class="box2">
				<div class="box3">
					<div class="box4"></div>
				</div>
			</div>
		</div>
	</div>

</body>
</html>
