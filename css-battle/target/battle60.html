<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 60</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        :root{
        	--aqua: #4f77ff;
        	--box: #191919;
            --yellow: #f9e492;
        }
        .container{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            z-index: 2;
            background: var(--box);
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .col{
        	width: 200px;
        	height: 150px;
        	background: var(--aqua);
        	position: relative;
        	overflow: hidden;
        }
        .b{
        	width: 100px;
        	height: 100px;
        	background: var(--box);
        	transform: rotate(45deg);
        	margin: 0 auto;
        	position: relative;
        	top: 120px;
        }
        .b1{
        	width: 50px;
        	height: 100px;
        	background: var(--box);
        	position: absolute;
        	right: -10px;
        	transform: rotate(45deg);
        }
        .b2{
        	width: 50px;
        	height: 100px;
        	background: var(--box);
        	position: absolute;
        	left: -10px;
        	transform: rotate(-45deg);
        }
        .b3{
        	width: 35px;
        	height: 100px;
        	background: var(--box);
        	position: absolute;
        	top: -8px;
        	transform: rotate(-45deg);
        }
        .b4{
        	width: 35px;
        	height: 100px;
        	background: var(--box);
        	position: absolute;
        	top: 0;
        	left: 55%;
        	transform: rotate(-45deg);
        }
        .b5{
        	width: 35px;
        	height: 105px;
        	background: var(--box);
        	position: absolute;
        	top: 0;
        	left: 30%;
        	transform: rotate(45deg);
        }
        .b6{
        	width: 35px;
        	height: 100px;
        	background: var(--box);
        	position: absolute;
        	top: -8px;
        	right: 0;
        	transform: rotate(45deg);
        }
	</style>
</head>
<body>

	<div class="container">
		<div class="box">
			<div class="col">
				<div class="b"></div>
				<div class="b1"></div>
				<div class="b2"></div>
				<div class="b3"></div>
				<div class="b4"></div>
				<div class="b5"></div>
				<div class="b6"></div>
			</div>
		</div>
	</div>

</body>
</html>
