<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 36</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .contaiener{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            background: rgba(26, 67, 65);
            display: flex;
            justify-content: space-between;
            flex-direction: column;
        }

        .col1{
        	width: 200px;
        	height: 100px;
        	margin: 0 auto;
        	display: flex;
            justify-content: space-between;
        }

        .row1, .row2{
        	width: 50px;
        	height: 200px;
        	border-bottom-right-radius: 30px;
        	border-bottom-left-radius: 30px;
        	background: #998235;
        }

        .col2{
        	width: 350px;
        	height: 100px;
        	margin: 0 auto;
        	display: flex;
            justify-content: space-between;
            align-items: end;
        }

        .row3, .row4, .row5{
        	width: 50px;
        	height: 200px;
        	border-top-left-radius: 30px;
        	border-top-right-radius: 30px;
        	background: #f3ac3c;
        }

	</style>
</head>
<body>

	<div class="contaiener">
		<div class="box">
			<div class="col1">
				<div class="row1"></div>
				<div class="row2"></div>
			</div>
			<div class="col2">
				<div class="row3"></div>
				<div class="row4"></div>
				<div class="row5"></div>
			</div>
		</div>
	</div>

</body>
</html>
