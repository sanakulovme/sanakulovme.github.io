<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 32</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .contaiener{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            background: rgba(255, 255, 255);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
       	.sm{
       		width: 200px;
       		height: 200px;
       		display: flex;
       	}
       	.col1{
       		width: 50px;
       		height: 200px;
       		transform: rotate(45deg);
       		position: absolute;
       		left: 170px;
       		top: 50px;
			background: rgb(163, 163, 104);
       	}

		.col2{
       		width: 50px;
       		height: 200px;
       		transform: rotate(-45deg);
       		position: absolute;
       		left: 170px;
       		top: 50px;
			background: rgb(243, 172, 60);
			display: flex;
			justify-content: center;
			align-items: center;
       	}

		.sm-col{
			width: 50px;
			height: 50px;
			background: rgb(251, 225, 140);
		}
	</style>
</head>
<body>

	<div class="contaiener">
		<div class="box">
			<div class="sm">
				<div class="col1"></div>
				<div class="col2">
					<div class="sm-col"></div>
				</div>
			</div>
		</div>
	</div>

</body>
</html>
