<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 30</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .contaiener{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            background: rgba(243, 172, 60);
        }
        .row1{
        	width: 100%;
        	height: 50px;
        	background: #f7ec7d;
        }
        .row2{
        	width: 100%;
        	height: 50px;
        	background: #e38f66;
        }
        .row3{
        	width: 100%;
        	height: 100px;
        	background: #aa445f;
        }
        .row4{
        	width: 100%;
        	height: 100px;
        	background: #62306d;
        }
	</style>
</head>
<body>

	<div class="contaiener">
		<div class="box">
			<div class="row1"></div>
			<div class="row2"></div>
			<div class="row3"></div>
			<div class="row4"></div>
		</div>
	</div>

</body>
</html>
