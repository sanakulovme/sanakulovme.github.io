<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 37</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .contaiener{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            background: rgba(101, 146, 207);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .col1{
        	width: 250px;
        	height: 250px;
        	display: flex;
            justify-content: center;
            align-items: center;
            background: #243d83;
        }
        .col2{
        	width: 150px;
        	height: 150px;
        	display: flex;
            justify-content: center;
            align-items: center;
            transform: rotate(15deg);
            background: rgba(101, 146, 207);
        }
        .col3{
        	width: 75px;
        	height: 75px;
        	display: flex;
            justify-content: center;
            transform: rotate(15deg);
            background: #243d83;
            align-items: center;
        }
	</style>
</head>
<body>

	<div class="contaiener">
		<div class="box">
			<div class="col1">
				<div class="col2">
					<div class="col3"></div>
				</div>
			</div>
		</div>
	</div>

</body>
</html>
