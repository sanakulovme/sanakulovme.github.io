<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 71</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        :root{
        	--aqua: #1a4341;
        	--box: #998235;
            --aqua-2: #0b2429;
            --white: #fff;
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            z-index: 2;
            background: var(--box);
            display: flex;
            align-items: end;
            justify-content: center;
        }
        .col{
        	width: 300px;
        	height: 240px;
            overflow: hidden;
        }
        .top{
        	width: 300px;
        	height: 180px;
        	/*border: 1px solid #000;*/
            display: flex;
            justify-content: space-between;
            position: relative;
        }
        .q{
        	width: 80px;
        	height: 180px;
        	border-radius: 100%;
        	background: var(--aqua);
        	display: flex;
        	justify-content: end;
            overflow: hidden;
        }
        .q2{
        	width: 80px;
        	height: 180px;
        	border-radius: 100%;
        	background: var(--aqua-2);
        	position: relative;
        	left: 15px;
        }
        .q3{
            width: 80px;
            height: 180px;
            border-radius: 100%;
            background: var(--aqua-2);
            position: relative;
            left: -15px;
        }
        .k{
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: var(--aqua);
            position: absolute;
            left: 60px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .es{
            width: 100px;
            height: 25px;
            /*border: 1px solid #000;*/
            overflow: hidden;
            position: relative;
            top: 13px;
            display: flex;
            justify-content: space-between;
        }
        .e{
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--box);
            position: relative;
            top: -20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .z{
            width: 20px;
            height: 20px;
            background: var(--aqua-2);
            border-radius: 50%;
        }
        .bottom{
            width: 150px;
            height: calc(240px - 180px);
            /*border: 1px solid #000;*/
            margin: 0 auto;
        }
        .m{
            width: 40px;
            height: 150px;
            background: var(--aqua-2);
            margin: 0 auto;
            position: relative;
            top: -60px;
            z-index: 15;
            border-top-left-radius: 50px;
            border-top-right-radius: 50px;
        }
        .m2{
            width: 120px;
            height: 120px;
            border-radius: 50%;
            /*border: 1px solid #000;*/
            position: relative;
            overflow: hidden;
            z-index: 10;
            top: -200px;
            margin: 0 auto;
        }
        .mc{
            width: 120px;
            height: 120px;
            background: var(--white);
            position: relative;
            top: -60px;
            display: flex;
            z-index: 20;
            justify-content: center;
            align-items: end;
        }
        .me{
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--box);
            position: relative;
            top: 40px;
            overflow: hidden;
        }
        .me2{
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: var(--aqua);
            position: relative;
            left: -50px;
            top: -150px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }
	</style>
</head>
<body>

	<div class="container">
		<div class="box">
			<div class="col">
				<div class="top">
					<div class="q">
						<div class="q2"></div>
					</div>
                    <div class="k">
                        <div class="es">
                            <div class="e">
                                <div class="z"></div>
                            </div>
                            <div class="e">
                                <div class="z"></div>
                            </div>
                        </div>
                    </div>
                    <div class="q">
                        <div class="q3"></div>
                    </div>
				</div>
                <div class="bottom">
                    <div class="m"></div>
                    <div class="m2">
                        <div class="mc">
                            <div class="me">
                                <div class="me2"></div>
                            </div>
                        </div>
                    </div>
                </div>
			</div>
		</div>
	</div>

</body>
</html>
