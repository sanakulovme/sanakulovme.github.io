<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle 4</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        
        .container {
            width: 100%;
            height: 100vh;
            background: rgba(98, 48, 109);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .box {
            width: 400px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .row {
            width: 300px;
            height: 200px;
        }
        
        .row-top,
        .row-bottom {
            width: 100%;
            height: 100px;
            display: flex;
        }
        
        .col-none,
        .col-active {
            width: 100px;
            height: 100px;
            /* border: 1px solid #000; */
        }
        
        .active-top {
            background: rgb(247, 236, 125);
            border-top-left-radius: 50%;
            border-top-right-radius: 50%;
        }
        
        .active-bottom {
            background: rgb(247, 236, 125);
            border-bottom-left-radius: 50%;
            border-bottom-right-radius: 50%;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="box">
            <div class="row">
                <div class="row-top">
                    <div class="col-none"></div>
                    <div class="col-active active-top"></div>
                    <div class="col-none"></div>
                </div>
                <div class="row-bottom">
                    <div class="col-active active-bottom"></div>
                    <div class="col-none"></div>
                    <div class="col-active active-bottom"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
