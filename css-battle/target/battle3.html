<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battel 3</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100%;
            height: 100vh;
            background: rgba(101, 146, 207);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .row{
            width: 300px;
            height: 150px;
            background: rgba(36, 61, 131);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .big-radus{
            width: 250px;
            height: 250px;
            background: rgba(101, 146, 207);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
        }
        .s-r{
            width: 150px;
            height: 150px;
            background: rgba(36, 61, 131);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
        }
        .small-radus{
            width: 50px;
            height: 50px;
            background: rgb(238, 184, 80);
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <div class="row">
                <div class="big-radus">
                    <div class="s-r">
                        <div class="small-radus"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
