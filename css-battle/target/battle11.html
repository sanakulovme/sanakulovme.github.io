<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Battle 11</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        
        .container {
            width: 100%;
            height: 100vh;
            background: rgba(25, 18, 16);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .box {
            width: 400px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .row {
            width: 350px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .box1,
        .box3 {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
        }
        
        .box1 {
            position: relative;
            left: 20px;
        }
        
        .sm1 {
            width: 100px;
            height: 100px;
            background: rgb(236, 160, 61);
            position: relative;
            top: 50px;
        }
        
        .sm3 {
            width: 100px;
            height: 100px;
            background: rgb(236, 160, 61);
            position: relative;
            top: -50px;
        }
        
        .box3 {
            position: relative;
            left: -20px;
        }
        
        .box2 {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgb(236, 160, 61);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .b-box {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(25, 18, 16);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .s-box {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #84271c;
        }
        
        .b1 {
            width: 60px;
            height: 60px;
            background: rgba(25, 18, 16);
            border-radius: 50%;
            position: relative;
            left: 20px;
            top: -30px;
        }
        
        .b2 {
            width: 60px;
            height: 60px;
            background: rgba(25, 18, 16);
            border-radius: 50%;
            position: relative;
            left: 20px;
            top: 70px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="box">
            <div class="row">
                <div class="box1">
                    <div class="sm1">
                        <div class="b1"></div>
                    </div>
                </div>
                <div class="box2">
                    <div class="b-box">
                        <div class="s-box"></div>
                    </div>
                </div>
                <div class="box3">
                    <div class="sm3">
                        <div class="b2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
