<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 48</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            background: #293462;
            /*background: #fe5f55;*/

            /*background: #a64942;*/

            display: flex;
            justify-content: center;
            align-items: center;
        }
        .sm{
            width: 200px;
            height: 120px;
            background: #a64942;
            border-radius: 20px;
        }
        .col{
            width: 200px;
            height: 100px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fe5f55;
        }
        .r{
            width: 140px;
            height: 40px;
            border-radius: 20px;
            background: #a64942;
        }
	</style>
</head>
<body>

	<div class="container">
		<div class="box">
            <div class="sm">
                <div class="col">
                    <div class="r"></div>
                </div>
            </div>
        </div>
	</div>
</body>
</html>
