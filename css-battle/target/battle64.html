<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 64</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        :root{
        	--while: #fff58f;
        	--box: #191919;
            --yellow-1: #824b20;
            --yellow-2: #f08027;
        }
        .container{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            z-index: 2;
            background: var(--box);
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .col{
        	width: 160px;
        	height: 160px;
        	border-radius: 50%;
        	background: var(--yellow-1);
        	display: flex;
            justify-content: center;
            align-items: center;
        }
        .sm{
        	width: 100px;
        	height: 100px;
        	border-radius: 50%;
        	background: var(--yellow-2);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .sm3{
            width: 120px;
            height: 120px;
            border-radius: 50%;
            /*border: 1px solid #000;*/
            overflow: hidden;
        }
        .m{
            width: 120px;
            height: 120px;
            background: var(--while);
            position: relative;
            top: 60px;
            display: flex;
            justify-content: center;
            align-items: start;
        }
        .r{
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--yellow-2);
            position: relative;
            top: -40px;
        }
        .r2{
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--while);
            position: absolute;
            left: 0;
            top: -10px;
        }

        .r3{
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--while);
            position: absolute;
            right: 0;
            top: -10px;
        }
	</style>
</head>
<body>

	<div class="container">
		<div class="box">
			<div class="col">
				<div class="sm">
					<div class="sm2">
                        <div class="sm3">
                            <div class="m">
                                <div class="r"></div>
                                <div class="r2"></div>
                                <div class="r3"></div>
                            </div>
                        </div>
                    </div>
				</div>
			</div>
		</div>
	</div>


</body>
</html>
