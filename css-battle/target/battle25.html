<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 25</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .contaiener{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            background: rgba(153, 130, 53);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .b-box{
        	width: 200px;
        	height: 200px;
        	display: flex;
        }
        .col{
        	width: 100px;
        	height: 200px;
        	/*border: 1px solid #000;*/
        	display: flex;
        	justify-content: space-around;
        	align-items: center;
        	flex-direction: column;
        }
        .col1{
        	width: 80px;
        	height: 100px;
        	background: rgb(26, 67, 65);
        	border-top-right-radius: 55%;
        	border-bottom-left-radius: 55%;
        }
        .col2{
        	width: 80px;
        	height: 60px;
        	border-top-right-radius: 70%;
        	border-bottom-left-radius: 70%;
        	background: rgb(243, 172, 60);
        }
        .col3{
        	width: 80px;
        	height: 60px;
        	border-top-left-radius: 70%;
        	border-bottom-right-radius: 70%;
        	background: rgb(243, 172, 60);
        }
        .col4{
        	width: 80px;
        	height: 100px;
        	background: rgb(26, 67, 65);
        	border-top-left-radius: 55%;
        	border-bottom-right-radius: 55%;
        }
	</style>
</head>
<body>

	<div class="contaiener">
		<div class="box">
			<div class="b-box">
				<div class="col">
				<div class="col1"></div>
				<div class="col2"></div>
			</div>
			<div class="col">
				<div class="col3"></div>
				<div class="col4"></div>
			</div>
			</div>
		</div>
	</div>

	<!-- <input type="color"> -->

</body>
</html>
