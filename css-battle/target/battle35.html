<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battel 35</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .contaiener{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            background: rgba(41, 52, 98);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .col{
        	width: 100px;
        	height: 200px;
        }
        .col1{
        	width: 100px;
        	height: 150px;
        	border-top-right-radius: 50px;
        	border-top-left-radius: 50px;
        	border-bottom-left-radius: 20px;
            background: rgba(255, 241, 293);
        	border-bottom-left-radius: 20px;
        	border-bottom-right-radius: 20px;
        }
        .col2{
        	width: 30px;
        	height: 50px;
        	margin: 0 auto;
        	border-bottom-left-radius: 10px;
            background: rgba(254, 95, 85);

        	border-bottom-left-radius: 10px;
        	border-bottom-right-radius: 10px;
        }
        .top{
        	width: 30px;
        	height: 10px;
        	background: #a64942;
        }
	</style>
</head>
<body>

	<div class="contaiener">
		<div class="box">
			<div class="col">
				<div class="col1"></div>
				<div class="col2">
					<div class="top"></div>
				</div>
			</div>
		</div>
	</div>

</body>
</html>
