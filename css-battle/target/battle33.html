<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle 33</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .contaiener{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            background: rgba(26, 67, 65);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .sm{
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .over_f{
            width: 100px;
            height: 150px;
            overflow: hidden;
        }

        .over_box{
            width: 150px;
            height: 150px;
            border-top-left-radius: 100%;
            background: rgba(153, 130, 53);
            border-bottom-left-radius: 100%;
            position: relative;
            left: 25px;
        }

        .eye{
            width: 30px;
            height: 30px;
            background: rgba(11, 36, 41);
            border-radius: 50%;
            position: relative;
            left: 30px;
            top: 30px;
        }
        .kub{
            width: 100px;
            height: 100px;
            background: rgba(243, 172, 60);
            border-top-right-radius: 100%;
            position: relative;
            top: -50px;
        }
    </style>
</head>
<body>

    <div class="contaiener">
        <div class="box">
            <div class="sm">
                <div class="over_f">
                    <div class="over_box">
                        <div class="eye"></div>
                    </div>
                </div>
                <div class="kub"></div>
            </div>
        </div>
    </div>

</body>
</html>
