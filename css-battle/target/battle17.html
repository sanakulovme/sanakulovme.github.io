<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Battle 17</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        
        .container {
            width: 100%;
            height: 100vh;
            background: rgba(9, 4, 42);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .box {
            width: 400px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }
        
        .row {
            width: 200px;
            height: 100px;
            /*background: rgba(231, 132, 129);*/
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
        
        .b-center {
            width: 50px;
            height: 40px;
            position: absolute;
            left: 75px;
            right: 0;
            background: rgba(231, 132, 129);
            z-index: 1;
        }
        
        .b-col {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(231, 132, 129);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .s-col {
            width: 60px;
            height: 60px;
            background: rgba(9, 4, 42);
            border-radius: 50%;
        }
        
        .box-top {
            width: 80px;
            height: 80px;
            background: rgba(9, 4, 42);
            border-radius: 50%;
            position: absolute;
            top: -43px;
            left: 60px;
            z-index: 333;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .bottom-box {
            width: 80px;
            height: 80px;
            background: rgba(9, 4, 42);
            /*border: 1px solid #000;*/
            border-radius: 50%;
            position: absolute;
            top: 63px;
            left: 60px;
            z-index: 333;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .sm-col {
            width: 60px;
            height: 60px;
            background: rgb(245, 187, 156);
            border-radius: 50%;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="box">
            <div class="row">
                <div class="box-top">
                    <div class="sm-col"></div>
                </div>
                <div class="b-col">
                    <div class="s-col"></div>
                </div>
                <div class="b-center"></div>
                <div class="b-col">
                    <div class="s-col"></div>
                </div>
                <div class="bottom-box">
                    <div class="sm-col"></div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
