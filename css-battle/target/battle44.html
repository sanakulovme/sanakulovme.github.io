<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 44</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            background: rgba(26, 67, 65);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .col{
        	width: 160px;
        	height: 180px;
        	/*border: 1px solid #000;*/
        	display: flex;
        	justify-content: space-between;
        	flex-direction: column;
        }
        .row{
        	width: 100%;
        	height: 20px;
        	background: #f3ac3c;
        }

        .sml{
        	width: 300px;
        	height: 300px;
            background: rgba(26, 67, 65);
        	border-radius: 50%;
        	position: absolute;
        	left: -150px;
        }

        .smr{
        	width: 300px;
        	height: 300px;
            background: rgba(26, 67, 65);
        	border-radius: 50%;
        	position: absolute;
        	left: 250px;
        }
	</style>
</head>
<body>
	<div class="container">
		<div class="box">
			<div class="sml"></div>
			<div class="col">
				<div class="row"></div>
				<div class="row"></div>
				<div class="row"></div>
				<div class="row"></div>
				<div class="row"></div>
			</div>
			<div class="smr"></div>
		</div>
	</div>
	<!-- <input type="color" name="" id=""> -->
</body>
</html>
