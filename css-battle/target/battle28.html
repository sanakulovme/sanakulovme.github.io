<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 28</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .contaiener{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            background: rgba(26, 67, 65);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .sm{
        	width: 260px;
        	height: 120px;
        }
        .row{
        	width: 100%;
        	height: 60px;
        	display: flex;
        	justify-content: space-between;
        	align-items: start;
        }
        .row:nth-child(2){
        	align-items: end !important;
        }
        .col-1, .col-6{
        	width: 50px;
        	height: 50px;
        	background: rgb(153, 130, 53);
        	border-radius: 50%;
        }
        .col-2{
        	width: 50px;
        	height: 50px;
        	background: rgb(243, 172, 60);
        	border-top-left-radius: 50%;
        	border-top-right-radius: 50%;
        }
        .col-3{
        	width: 50px;
        	height: 50px;
        	background: rgb(153, 130, 53);
        	border-top-left-radius: 50%;
        	border-top-right-radius: 50%;
        }
        .col-4, .col-7{
        	width: 50px;
        	height: 50px;
        	background: rgb(243, 172, 60);
        	border-radius: 50%;
        }
        .col-5{
        	width: 50px;
        	height: 50px;
        	background: rgb(243, 172, 60);
        	border-bottom-left-radius: 50%;
        	border-bottom-right-radius: 50%;
        }
        .col-8{
        	width: 50px;
        	height: 50px;
        	background: rgb(153, 130, 53);
        	border-bottom-left-radius: 50%;
        	border-bottom-right-radius: 50%;
        }
	</style>
</head>
<body>

	<div class="contaiener">
		<div class="box">
			<div class="sm">
				<div class="row">
					<div class="col-1"></div>
					<div class="col-2"></div>
					<div class="col-3"></div>
					<div class="col-4"></div>
				</div>
				<div class="row">
					<div class="col-5"></div>
					<div class="col-6"></div>
					<div class="col-7"></div>
					<div class="col-8"></div>
				</div>
			</div>
		</div>
	</div>

</body>
</html>
