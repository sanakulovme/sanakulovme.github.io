<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 40</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .contaiener{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            background: rgba(101, 146, 207);
            display: flex;
            justify-content: center;
            align-items: center;
        	position: relative;
        }
        .col{
        	width: 200px;
        	height: 200px;
        	background: #233d83;
        	border-radius: 50%;
        	border-top-left-radius: 0;
        	display: flex;
        	justify-content: center;
        	align-items: center;
        }
        .sm{
        	width: 100px;
        	height: 100px;
            background: rgba(101, 146, 207);
        	border-radius: 50%;
        }
        .bd{
        	width: 50px;
        	height: 100px;
            background: rgba(101, 146, 207);
        	position: absolute;
        	top: 50px;
        	left: 150px;
        	/*border: 1px solid #000;*/
        }
	</style>
</head>
<body>
      <div class="contaiener">
      	<div class="box">
      		<div class="bd"></div>
      		<div class="col">
      			<div class="sm"></div>
      		</div>
      	</div>
      </div>


</body>
</html>
