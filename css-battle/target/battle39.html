<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 39</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .contaiener{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            background: #1a4341;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .col{
        	width: 250px;
        	height: 200px;
        	/*background: #998235;*/
        	border-radius: 45%;
        	display: flex;
        	justify-content: center;
        	align-items: center;
        	overflow: hidden;
        	position: relative;
        }
        .row{
        	width: 250px;
        	height: 100px;
        	display: flex;
        	justify-content: space-between;
        	flex-direction: column;
        }
        .row-s{
        	width: 250px;
        	height: 20px;
        	background: #f3ac3c;
        }
        .top{
        	width: 150px;
        	height: 100px;
        	border-radius: 55%;
        	position: absolute;
        	top: 0;
        	overflow: hidden;
        }
        .top1{
        	width: 150px;
        	background: #998235;
        	height: 150px;
        	position: absolute;
        	top: -120px;
        }

        .bottom{
        	width: 150px;
        	height: 100px;
        	border-radius: 55%;
        	position: absolute;
        	bottom: 0;
        	overflow: hidden;
        }

        .bottom1{
        	width: 150px;
        	background: #998235;
        	height: 150px;
        	position: absolute;
        	bottom: -120px;
        }
	</style>
</head>
<body>

	<div class="contaiener">
		<div class="box">
			<div class="col">
				<div class="top">
					<div class="top1"></div>
				</div>
				<div class="row">
					<div class="row-s"></div>
					<div class="row-s"></div>
					<div class="row-s"></div>
				</div>
				<div class="bottom">
					<div class="bottom1"></div>
				</div>
			</div>
		</div>
	</div>

	<!-- <input type="color"> -->

</body>
</html>
