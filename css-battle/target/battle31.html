<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 31</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .contaiener{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            background: rgba(170, 68, 95);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .col{
        	width: 220px;
        	height: 200px;
        	border-radius: 50%;
        	position: relative;
        }
        .hb{
        	width: 195px;
        	height: auto;
        	overflow: hidden;
        }
        .c1{
        	left: 70px;
        	background: #f7ec7f;
        }
        .c2{
        	background: #e38e66;
        	left: -120px;
        }
        .border{
        	width: 50px;
        	height: 100%;
        	z-index: 333;
            background: rgba(170, 68, 95);
        }
	</style>
</head>
<body>

	<div class="contaiener">
		<div class="box">
			<div class="hb">
				<div class="col c1"></div>
			</div>
			<div class="border"></div>
			<div class="hb">
				<div class="col c2"></div>
			</div>
		</div>
	</div>

</body>
</html>
