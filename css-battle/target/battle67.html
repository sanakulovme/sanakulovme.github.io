<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 67</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        :root{
        	--aqua: #5dbcf9;
        	--box: #191919;
            --yellow-1: #824b20;
            --yellow-2: #f2ad43;
        }
        .container{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            z-index: 2;
            background: var(--aqua);
            display: flex;
            /*justify-content: center;
            align-items: center;*/
        }
        .d{
        	display: flex;
        	flex-direction: column;
        	justify-content: space-between;
        }
        .col1{
        	width: 45px;
        	height: 300px;
        	/*border: 1px solid #000;*/
        }
        .r1{
        	width: 45px;
        	height: 80px;
        	background: var(--box);
        }
        .r2{
        	width: 45px;
        	height: 110px;
        	background: var(--box);
        }
        .r3{
        	width: 45px;
        	height: 30px;
        	background: var(--box);
        }
        .col2, .col4{
        	margin-left: 10px;
        }
        .r4{
        	width: 140px;
        	height: 30px;
        	background: var(--box);
        }
        .r5{
        	width: 140px;
        	height: 110px;
        	background: var(--box);
        }
        .r6, .r7{
        	width: 140px;
        	height: 80px;
        	background: var(--box);
        }
        .col3{
        	margin-left: 10px;

        }
	</style>
</head>
<body>

	<div class="container">
		<div class="box">
			<div class="col1 d">
				<div class="r1"></div>
				<div class="r2"></div>
				<div class="r3"></div>
			</div>
			<div class="col2 d">
				<div class="r4"></div>
				<div class="r5"></div>
				<div class="r6"></div>
			</div>
			<div class="col3 d">
				<div class="r7"></div>
				<div class="r5"></div>
				<div class="r4"></div>
			</div>
			<div class="col4 d">
				<div class="r3"></div>
				<div class="r2"></div>
				<div class="r1"></div>
			</div>
		</div>
	</div>

</body>
</html>
