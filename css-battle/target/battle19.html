<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Battle 19</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        
        .contaiener {
            width: 100%;
            height: 100vh;
            background: rgba(11, 36, 44);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .box {
            width: 400px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .col1 {
            width: 100px;
            height: 100px;
            /*outline: 1px solid;*/
            transform: rotate(45deg);
            position: absolute;
            top: 136px;
            background: #f3ac3c;
        }
        
        .col2 {
            width: 100px;
            height: 100px;
            /*outline: 1px solid;*/
            transform: rotate(45deg) skewY(10deg);
            position: absolute;
            top: 35px;
            background: #998235;
        }
    </style>
</head>

<body>

    <div class="contaiener">
        <div class="box">
            <img src="../../images/Error.png" alt="">

        </div>
    </div>

    <!-- <input type="color" name="" id=""> -->

</body>

</html>
