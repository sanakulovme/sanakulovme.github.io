<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 71</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        :root{
        	--aqua: #1a4341;
        	--box: #243d83;
            --aqua-2: #0b2429;
            --white: #6592cf;
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
        	width: 100%;
        	height: 100vh;
        	background: #555;
        	display: flex;
        	justify-content: center;
        	align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            z-index: 2;
            background: var(--box);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .col{
        	width: 170px;
        	height: 170px;
        	border-radius: 50%;
        	position: relative;
        }
        .r{
        	border-radius: 50%;
        }
        .r1{
        	width: 65px;
        	height: 65px;
        	background: var(--white);
        	margin: 0 auto;
        }
        .r2{
        	width: 65px;
        	height: 65px;
        	background: var(--white);
        	margin: 0 auto;
        	position: absolute;
        	bottom: 0;
        	left: 50px;
        }
        .r3{
        	width: 65px;
        	height: 65px;
        	background: var(--white);
        	margin: 0 auto;
        	position: absolute;
        	left: 0;
        	top: 50px;
        }
        .r4{
        	width: 65px;
        	height: 65px;
        	background: var(--white);
        	margin: 0 auto;
        	position: absolute;
        	right: 0;
        	top: 50px;
        }
       /* .r5{
        	width: 65px;
        	height: 65px;
        	background: var(--white);
        	margin: 0 auto;
        	position: absolute;
        	right: 10px;
        	top: 10px;
        }*/
	</style>
</head>
<body>

	<div class="container">
		<div class="box">
			<div class="col">
				<div class="r1 r"></div>
				<div class="r2 r"></div>
				<div class="r3 r"></div>
				<div class="r4 r"></div>
				<div class="r5 r"></div>
				<div class="r6 r"></div>
				<div class="r7 r"></div>
				<div class="r8 r"></div>
				<div class="r9 r"></div>
				<div class="r10 r0"></div>
			</div>
		</div>
	</div>

</body>
</html>
