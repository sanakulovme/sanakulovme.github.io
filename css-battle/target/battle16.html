<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Battle 16</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        
        .container {
            width: 100%;
            height: 100vh;
            background: rgba(11, 36, 41);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .box {
            width: 400px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .col {
            width: 200px;
            height: 200px;
            background: rgb(153, 130, 53);
            transform: rotate(45deg);
            border-top-left-radius: 50%;
            border-bottom-right-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .col2 {
            width: 180px;
            height: 180px;
            background: rgb(11, 36, 41);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .col3 {
            width: 140px;
            height: 140px;
            background: rgb(243, 172, 60);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .s-m {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgb(11, 36, 41);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="box">
            <div class="col">
                <div class="col2">
                    <div class="col3">
                        <div class="s-m"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
