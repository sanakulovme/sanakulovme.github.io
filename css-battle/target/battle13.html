<!DOCTYPE html>
<html>

<head>
    <me ta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Battle 13</title>
        <style>
            * {
                padding: 0;
                margin: 0;
                box-sizing: border-box;
            }
            
            .container {
                width: 100%;
                height: 100vh;
                background: rgba(11, 36, 41);
                display: flex;
                justify-content: center;
                align-items: center;
            }
            
            .box {
                width: 400px;
                height: 300px;
                display: flex;
                justify-content: center;
                align-items: center;
                position: relative;
                overflow: hidden;
            }
            
            .col {
                width: 200px;
                height: 200px;
                background: rgb(243, 172, 60);
                position: absolute;
                transform: rotate(45deg);
                top: -100px;
                left: -100px;
            }
        </style>
</head>

<body>

    <div class="container">
        <div class="box">
            <div class="col"></div>
        </div>
    </div>

    <!-- <input type="color"> -->

</body>

</html>
