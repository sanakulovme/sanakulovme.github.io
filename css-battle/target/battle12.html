<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Battle 12</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        
        .container {
            width: 100%;
            height: 100vh;
            background: rgba(245, 214, 180);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .box {
            width: 400px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .row {
            width: 100%;
            height: 100px;
            display: flex;
            justify-content: center;
            /*align-items: center;*/
            /*border: 1px solid #000;*/
        }
        
        .col {
            width: 100px;
            height: 50px;
            border-top-left-radius: 90px;
            border-top-right-radius: 90px;
            background: #d86f45;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            /*outline: 1px solid;*/
        }
        
        .col1 {
            width: 100px;
            height: 50px;
            border-bottom-left-radius: 90px;
            border-bottom-right-radius: 90px;
            background: #d86f45;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            top: 50px;
            left: 20px;
            /*outline: 1px solid;*/
        }
        
        .col3 {
            width: 100px;
            height: 50px;
            border-bottom-left-radius: 90px;
            border-bottom-right-radius: 90px;
            background: #d86f45;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            top: 50px;
            left: -20px;
            /*outline: 1px solid;*/
        }
        
        .col-sm {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            position: absolute;
            top: 20px;
            background: rgba(245, 214, 180);
        }
        
        .col-sm2 {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            position: absolute;
            top: -30px;
            background: rgba(245, 214, 180);
        }
        
        .r2 {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #d86f45;
            position: absolute;
            right: 0;
            top: -10px;
        }
        
        .r1 {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #d86f45;
            position: absolute;
            left: 0;
            top: -10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="box">
            <div class="row">
                <div class="col1">
                    <div class="r1"></div>
                    <div class="col-sm2"></div>
                </div>
                <div class="col">
                    <div class="col-sm"></div>
                </div>
                <div class="col3">
                    <div class="r2"></div>
                    <div class="col-sm2"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- <input type="color" name="" id=""> -->

</body>

</html>
