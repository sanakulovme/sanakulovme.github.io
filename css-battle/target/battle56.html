<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 56</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        :root{
        	--aqua: #4f77ff;
        	--box: #191919;
        }
        .container{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            z-index: 2;
            background: var(--box);
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .col{
        	width: 120px;
        	height: 130px;
        	border-top-left-radius: 100px;
        	border-top-right-radius: 100px;
        	/*background: var(--aqua);*/
        }
        .t{
        	width: 120px;
        	height: 100px;
        	border-top-left-radius: 100px;
        	border-top-right-radius: 100px;
        	border-bottom-right-radius: 15px;
        	border-bottom-left-radius: 15px;
        	background: var(--aqua);
        	display: flex;
        	align-items: end;
        	justify-content: end;
        }
        .eye{
        	width: 40px;
        	height: 40px;
        	border-radius: 50%;
        	background: var(--box);
        }
        .r{
        	width: 120px;
        	height: 40px;
        	display: flex;
        	justify-content: center;
        	align-items: center;
        	position: relative;
        	top: -7px;
        }
        .b{
        	width: 80px;
        	height: 30px;
        	margin: 0 auto;
        	background: var(--aqua);
        	border-bottom-right-radius: 20px;
        	border-bottom-left-radius: 20px;
        }
        .br{
        	width: 20px;
        	height: 20px;
        	border-radius: 50%;
        	background: var(--box);
        	margin: 0 auto;
        	position: relative;
        	top: -9px;
        }
        .bc{
        	width: 40px;
        	height: 20px;
        	margin: 0 auto;
        	display: flex;
        	justify-content: space-between;
        }
        .v{
        	width: 10px;
        	height: 20px;
        	background: var(--box);
        	border-top-left-radius: 10px;
        	border-top-right-radius: 10px;
        }
	</style>
</head>
<body>

	<div class="container">
		<div class="box">
			<div class="col">
				<div class="t">
					<div class="r">
						<div class="eye" style="margin-right: 10px;"></div>
						<div class="eye"></div>
					</div>
				</div>
				<div class="b">
					<div class="br"></div>
					<div class="bc">
						<div class="v"></div>
						<div class="v"></div>
						<div class="v"></div>
					</div>
				</div>
			</div>
		</div>
	</div>

</body>
</html>
