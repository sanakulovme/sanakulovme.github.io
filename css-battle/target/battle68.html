<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 68</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        :root{
        	--aqua: #5dbcf9;
        	--box: #191919;
            --yellow-2: #824b20;
            --yellow-1: #e08027;
            --yellow: #f2ad43;
        }
        .container{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            z-index: 2;
            background: var(--box);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .col{
        	width: 120px;
        	height: 170px;
        }
        .t{
        	width: 50px;
        	height: 50px;
        	border-radius: 50%;
        	background: var(--yellow);
        	margin: 0 auto;
        }
        .t2{
        	width: 120px;
        	height: 120px;
        	background: var(--yellow-1);
        	border-top-left-radius: 100px;
        	border-top-right-radius: 100px;
        	border-bottom-left-radius: 20px;
        	border-bottom-right-radius: 20px;
        	position: relative;
        	top: -25px;
        	z-index: 2;
        }
        .t3{
        	width: 50px;
        	height: 50px;
        	border-radius: 50%;
        	background: var(--yellow-2);
        	margin: 0 auto;
        	position: relative;
        	top: -50px;
        	z-index: 1;
        }
	</style>
</head>
<body>

	<div class="container">
		<div class="box">
			<div class="col">
				<div class="t"></div>
				<div class="t2"></div>
				<div class="t3"></div>
			</div>
		</div>
	</div>

</body>
</html>
