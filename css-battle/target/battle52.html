<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 52</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        :root{
        	--box: #6592cf;
        	--aqua: #243d83;
        	--yellow: #eeb850;
        }
        .container{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            z-index: 2;
            background: var(--box);
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .row{
        	width: 310px;
        	height: 80px;
        	/*border: 1px solid #000;*/
        	display: flex;
        	justify-content: space-between;
        }
        .col1{
        	width: 100px;
        	height: 80px;
        	display: flex;
        	justify-content: space-between;
        	align-items: end;
        	/*border: 1px solid #000;*/
        	position: relative;
        }
        .col2{
        	width: 145px;
        	height: 80px;
        	/*border: 1px solid #000;*/
        	display: flex;
        	justify-content: space-between;
        	align-items: end;
        }
        .u{
        	width: 10px;
        	height: 50px;
        	background: var(--aqua);
        	position: relative;
        	display: flex;
        	justify-content: center;
        }
        .r{
        	width: 20px;
        	height: 20px;
        	border-radius: 50%;
        	background: var(--aqua);
        	position: absolute;
        	top: -10px;
        }
        .y1{
        	width: 40px;
        	height: 40px;
        	border-radius: 50%;
        	background: var(--yellow);
        	position: absolute;
        	top: 10px;
        	left: -15px;
        }
        .y2{
        	width: 60px;
        	height: 60px;
        	border-radius: 50%;
        	position: absolute;
        	background: var(--yellow);
        	top: -10px;
        	left: 20px;
        }
        .y3{
        	width: 40px;
        	height: 40px;
        	border-radius: 50%;
        	background: var(--yellow);
        	position: absolute;
        	top: 10px;
        	right: -15px;
        }
	</style>
</head>
<body>

	<div class="container">
		<div class="box">
			<div class="row">
				<div class="col1">
						<div class="y1"></div>
					<div class="u">
						<div class="r"></div>
					</div>
						<div class="y2"></div>
					<div class="u">
						<div class="r"></div>
					</div>
						<div class="y3"></div>
					<div class="u">
						<div class="r"></div>
					</div>
				</div>
				<div class="col2">
					<div class="u">
						<div class="r"></div>
					</div>
					<div class="u">
						<div class="r"></div>
					</div>
					<div class="u">
						<div class="r"></div>
					</div>
					<div class="u">
						<div class="r"></div>
					</div>
				</div>
			</div>
		</div>
	</div>

</body>
</html>
