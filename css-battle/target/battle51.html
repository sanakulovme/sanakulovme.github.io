<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 51</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            z-index: 2;
            background: #293462;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .col{
        	width: 270px;
        	height: 100px;
        	display: flex;
        }
        .left{
        	width: 60px;
        	height: 60px;
        	border-top-left-radius: 50px;
        	border-bottom-left-radius: 50px;
        	border: 10px solid #fff1c1;
        	border-right: 0;
        }
        .center{
        	width: calc(270px - (60px + 60px));
        	height: 100px;
        	background: #fff1c1;
        	border-bottom-right-radius: 50px;
        	border-bottom-left-radius: 50px;
        	display: flex;
        }
        .cl{
        	width: 40px;
        	height: 30px;
        	margin: 20px 0 0 20px;
        	display: flex;
        	flex-direction: column;
        	justify-content: space-between;
        }
        .right{
        	width: 60px;
        	height: 60px;
        	border-top-right-radius: 50px;
        	border-bottom-right-radius: 50px;
        	border: 10px solid #fff1c1;
        	border-left: 0;
        }
        .p{
        	width: 40px;
        	height: 10px;
        	background: #fe5e55;
        	border-radius: 10px;
        }
        .cr{
        	width: 40px;
        	height: 40px;
        	border-radius: 50%;
        	background: #fe5e55;
        	position: relative;
        	left: 30px;
        	top: 40px;
        }
	</style>
</head>
<body>

	<div class="container">
		<div class="box">
			<div class="col">
				<div class="left"></div>
				<div class="center">
					<div class="cl">
						<div class="p"></div>
						<div class="p"></div>
					</div>
					<div class="cr"></div>
				</div>
				<div class="right"></div>
			</div>
		</div>
	</div>
</body>
</html>
