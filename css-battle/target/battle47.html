<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 47</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            background: rgba(27, 67, 65);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .col{
        	width: 100px;
        	height: 100px;
        	border-radius: 50%;
        	background: #f3ac3c;
        	position: relative;
        }

        .row1{
        	width: 10px;
        	height: 180px;
        	border-radius: 20px;
        	background: #f3ac3c;
        	position: relative;
        	left: 45px;
        	top: -50px;
        }

        .row2{
        	width: 10px;
        	height: 180px;
        	border-radius: 20px;
        	background: #f3ac3c;
        	position: relative;
        	left: 54px;
        	top: -225px;
        	transform: rotate(60deg);
        }

        .row3{
        	width: 10px;
        	height: 180px;
        	border-radius: 20px;
        	background: #f3ac3c;
        	position: relative;
        	left: 54px;
        	top: -395px;
        	transform: rotate(-60deg);
        }
        .r1{
        	width: 30px;
        	height: 30px;
        	border-radius: 50%;
        	background: #998235;
        	position: absolute;
        	left: 20px;
        	top: 20px;
        	z-index: 999;
        }

        .r2{
        	width: 10px;
        	height: 10px;
        	border-radius: 50%;
        	background: #998235;
        	position: absolute;
        	left: 70px;
        	top: 20px;
        	z-index: 999;
        }
        .r3{
        	width: 20px;
        	height: 20px;
        	border-radius: 50%;
        	background: #998235;
        	position: absolute;
        	left: 40px;
        	top: 65px;
        	z-index: 999;
        }
	</style>
</head>
<body>

	<div class="container">
		<div class="box">
			<div class="col">
				<div class="r1"></div>
				<div class="r2"></div>
				<div class="r3"></div>
				<div class="row1"></div>
				<div class="row2"></div>
				<div class="row3"></div>
			</div>
		</div>
	</div>

</body>
</html>
