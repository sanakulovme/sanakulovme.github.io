<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 66</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        :root{
        	--aqua: #5dbcf9;
        	--box: #191919;
            --yellow-1: #824b20;
            --yellow-2: #f2ad43;
        }
        .container{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            z-index: 2;
            background: var(--box);
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .col{
        	width: 250px;
        	height: 100px;
        	display: flex;
        	justify-content: center;
        	align-items: start;
        	position: relative;
        	overflow: hidden;
        }
        .t{
        	width: 250px;
        	height: 80px;
        	background: var(--yellow-2);
        }
        .b{
        	width: 80px;
        	height: 30px;
        	background: var(--box);
        	margin: 0 auto;
        	border-bottom-right-radius: 10px;
        	border-bottom-left-radius: 10px;
        	display: flex;
        	justify-content: center;
        	align-items: end;
        }
        .k{
        	width: 20px;
        	height: 20px;
        	background: var(--yellow-2);
        	position: relative;
        }
        .k1{
        	width: 10px;
        	height: 10px;
        	border-radius: 50%;
        	background: var(--yellow-2);
        	position: absolute;
        	top: -5px;
        	left: -5px;
        }
        .k2{
        	width: 10px;
        	height: 10px;
        	border-radius: 50%;
        	background: var(--yellow-2);
        	position: absolute;
        	top: -5px;
        	right: -5px;
        }
        .radus1{
        	width: 100px;
        	height: 100px;
        	background: var(--box);
        	border-radius: 50%;
        	position: absolute;
        	left: -50px;
        }
        .radus2{
        	width: 100px;
        	height: 100px;
        	background: var(--box);
        	border-radius: 50%;
        	position: absolute;
        	right: -50px;
        }
        .radus3{
        	width: 200px;
        	height: 200px;
        	background: var(--box);
        	border-radius: 50%;
        	position: absolute;
        	bottom: -160px;
        	left: -35px;
        }
        .radus4{
        	width: 200px;
        	height: 200px;
        	background: var(--box);
        	border-radius: 50%;
        	position: absolute;
        	bottom: -160px;
        	right: -35px;
        }
	</style>
</head>
<body>

	<div class="container">
		<div class="box">
			<div class="col">
				<div class="t">
					<div class="b">
						<div class="k">
							<div class="k1"></div>
							<div class="k2"></div>
						</div>
					</div>
				</div>
				<div class="radus1"></div>
				<div class="radus2"></div>
				<div class="radus3"></div>
				<div class="radus4"></div>
			</div>
		</div>
	</div>

</body>
</html>
