<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Battle 15</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        
        .container {
            width: 100%;
            height: 100vh;
            background: rgba(9, 4, 42);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .box {
            width: 400px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .box1,
        .box2 {
            width: 150px;
            height: 150px;
            background: #000;
            border-radius: 50%;
            overflow: hidden;
        }
        
        .box1 {
            position: relative;
            left: 25px;
            background: rgb(142, 63, 97);
        }
        
        .box2 {
            position: relative;
            left: -25px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgb(231, 132, 129);
        }
        
        .box3 {
            width: 150px;
            height: 150px;
            background: rgba(9, 4, 42);
            border-radius: 90%;
            z-index: 3;
            position: relative;
            left: -100px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">
            <div class="box1"></div>
            <div class="box2">
                <div class="box3"></div>
            </div>
        </div>
    </div>

</body>

</html>
