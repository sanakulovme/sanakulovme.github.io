<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle 2</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .contaiener{
            width: 100%;
            height: 100vh;
            background: rgba(98, 55, 78);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box2{
            width: 300px;
            height: 200px;
            display: flex;
            justify-content: space-between;
            flex-direction: column;
            align-items: center;
        }
        .row{
            width: 100%;
            height: 50px;
            display: flex;
            justify-content: space-between;
        }
        .s-box{
            width: 50px;
            height: 50px;
            background: rgba(253, 197, 123);
        }
    </style>
</head>
<body>
    <div class="contaiener">
        <div class="box">
            <div class="box2">
                <div class="row">
                    <div class="s-box"></div>
                    <div class="s-box"></div>
                </div>
                <div class="row">
                    <div class="s-box"></div>
                    <div class="s-box"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
