<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 42</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            background: rgba(41, 52, 98);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .col{
        	width: 200px;
        	height: 200px;
        	/*border: 1px solid #000;*/
        	border-top-left-radius: 50%;
        	border-top-right-radius: 50%;
        	border-bottom-right-radius: 50px;
        	border-bottom-left-radius: 50px;
        	background: #fe5f55;
        	overflow: hidden;
        }
        .r1{
        	width: 100%;
        	height: 50px;
        	display: flex;
        }
        .s1{
        	width: 100px;
        	height: 100px;
        	border-radius: 50%;
        	background: #fff;
        	position: relative;
        	top: -50px;
        }

        .s2{
        	width: 100px;
        	height: 100px;
        	border-radius: 50%;
        	background: #fff;
        	position: relative;
        	top: -50px;
        }


        .r2{
        	width: 160px;
        	height: 60px;
        	margin: 0 auto;
        	position: relative;
        	top: 40px;
        	display: flex;
        	justify-content: space-between;
        }
        .eye{
        	width: 60px;
        	height: 60px;
        	border-radius: 50%;
        	background: #fff;
        }


        .bd{
        	width: 40px;
        	height: 10px;
        	background: #fff;
        	margin: 0 auto;
        	position: relative;
        	top: 60px;
        	border-radius: 10px;
        }
	</style>
</head>
<body>

	<div class="container">
		<div class="box">
			<div class="col">
				<div class="r1">
					<div class="s1"></div>
					<div class="s2"></div>
				</div>
				<div class="r2">
					<div class="eye"></div>
					<div class="eye"></div>
				</div>
				<div class="bd"></div>
			</div>
		</div>
	</div>

</body>
</html>
