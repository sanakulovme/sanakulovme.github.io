<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 21</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            background: rgba(34, 34, 34);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .col{
        	width: 200px;
        	height: 200px;
        	display: flex;
        }
        .col1{
        	width: 30px;
        	height: 100px;
        	transform: rotate(45deg);
        	position: relative;
        	left: 55px;
            background: rgba(242, 153, 74);
        	top: 10px;
        	border-bottom-left-radius:10px;
        }

        .col2{
        	width: 30px;
        	height: 70px;
        	transform: rotate(-45deg);
        	position: relative;
        	left: 21px;
            background: rgba(242, 153, 74);
        	top: 70px;
        }
        .col3{
        	width: 30px;
        	height: 100px;
        	transform: rotate(45deg);
        	position: relative;
        	left: 53px;
            background: rgba(45, 156, 219);
        	top: 93px;
        	border-top-right-radius: 10px;
        }
        .col4{
        	width: 30px;
        	height: 70px;
        	transform: rotate(-45deg);
        	position: relative;
        	left: 26px;
            background: rgba(45, 156, 219);
        	top: 61px;
        	border-bottom-left-radius: 10px;
        }
	</style>
</head>
<body>

	<div class="container">
		<div class="box">
			<div class="col">
				<div class="col1"></div>
				<div class="col2"></div>
				<div class="col3"></div>
				<div class="col4"></div>
			</div>
		</div>
	</div>

</body>
</html>
