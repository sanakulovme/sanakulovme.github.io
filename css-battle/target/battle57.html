<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Battle 57</title>
	<style>
		*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        :root{
        	--aqua: #4f77ff;
        	--box: #191919;
            --yellow: #f9e492;
        }
        .container{
            width: 100%;
            height: 100vh;
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 400px;
            height: 300px;
            z-index: 2;
            background: var(--box);
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .col{
        	width: 110px;
        	height: 110px;
        	background: var(--aqua);
        	position: relative;
        }
        .tl{
        	width: 60px;
        	height: 60px;
        	border-radius: 50%;
        	background: var(--box);
        	position: absolute;
        	top: -20px;
        	left: -20px;
        }
        .tr{
        	width: 60px;
        	height: 60px;
        	border-radius: 50%;
        	background: var(--box);
        	position: absolute;
        	top: -20px;
        	right: -20px;
        }
        .bl{
        	width: 60px;
        	height: 60px;
        	border-radius: 50%;
        	background: var(--box);
        	position: absolute;
        	bottom: -20px;
        	left: -20px;
        }
        .br{
        	width: 60px;
        	height: 60px;
        	border-radius: 50%;
        	background: var(--box);
        	position: absolute;
        	right: -20px;
        	bottom: -20px;
        }
        .r1{
            width: 45px;
            height: 45px;
            background: var(--yellow);
            border-radius: 50%;
        }
        .r2{
            width: 45px;
            height: 45px;
            background: var(--yellow);
            border-radius: 50%;
            position: absolute;
            right: 0;
        }
        .r3{
            width: 45px;
            height: 45px;
            background: var(--yellow);
            border-radius: 50%;
            position: absolute;
            bottom: 0;
        }

        .r4{
            width: 45px;
            height: 45px;
            background: var(--yellow);
            border-radius: 50%;
            position: absolute;
            right: 0;
            bottom: 0;
        }
        .p1{
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--aqua);
        }
        .p2{
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--aqua);
            position: absolute;
            right: 0;
        }
        .p3{
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--aqua);
            position: absolute;
            bottom: 0;
        }
        .p4{
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--aqua);
            position: absolute;
            right: 0;
            bottom: 0;
        }
	</style>
</head>
<body>

	<div class="container">
		<div class="box">
			<div class="col">
				<div class="tl">
                    <div class="r1">
                        <div class="p1"></div>
                    </div>
				</div>
				<div class="tr">
                    <div class="r2">
                        <div class="p2"></div>
                    </div>
				</div>
				<div class="bl">
                    <div class="r3">
                        <div class="p3"></div>
                    </div>
                </div>
				<div class="br">
                    <div class="r4">
                        <div class="p4"></div>
                    </div>
                </div>
			</div>
		</div>
	</div>


</body>
</html>
