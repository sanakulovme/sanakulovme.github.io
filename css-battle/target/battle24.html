<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle 24</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
			width: 100%;
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			background: #555;
		}
		.box{
			width: 400px;
			height: 300px;
			background: rgb(98, 48, 109);
			display: flex;
			justify-content: center;
			align-items: center;
		}
        .col{
            width: 100px;
            height: 100%;
            margin: 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .col-l{
            width: 100px;
            height: 100px;
            background: rgb(170, 68, 95);
            border-top-left-radius: 50%;
            border-top-right-radius: 50%;
            position: relative;
            top: -50px;
        }
        .col-r{
            width: 100px;
            height: 100px;
            background: rgb(227, 143, 102);
            border-bottom-left-radius: 50%;
            border-bottom-right-radius: 50%;
            position: relative;
            top: 50px;
        }
        .radus-l, .radus-r{
            width: 100px;
            height: 100px;
            background: rgb(247, 256, 125);
            border-radius: 50%;
    
        }
        .radus-l{
            position: relative;
            top: 50px;
        }
        .radus-r{
            position: relative;
            top: -50px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">
            <div class="col">
                <div class="col-l">
                    <div class="radus-l"></div>
                </div>
            </div>
            <div class="col">
                <div class="col-r">
                    <div class="radus-r"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- <input type="color"> -->
    
</body>
</html>
