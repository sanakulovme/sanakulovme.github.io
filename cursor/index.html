<html lang="en">

<head>

    <link rel="stylesheet" href="./bootstrap.min.css">
    <style>
        body {
            height: 100vh;

            justify-content: center;

            position: relative;

<body id="body" class="error">

    <form autocomplete="off" class="shadow d-flex flex-column p-5 col-lg-3">

        <p class="text-center display-6">#Login Form</p>
        <label for="login" class="form-label h4">#Login:</label>

        <label for="password" class="h4">#Password:</label>
        <input type="password" class="form-control mb-4" oninput="passFn()" placeholder="Password" id="password">

    </form>
