<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./bootstrap.min.css">
    <style>
        @media screen and (max-width: 768px) {
            .cl {
                margin-bottom: 30px;
            }
        }
    </style>
</head>

<body>

    <div class="container d-flex justify-content-center pt-5">
        <div class="row justify-content-around align-items-center" style="width: 100%;">
            <div class="col-lg-4 cl border border-2 p-3" style="height: 280px; width: 250px;">
                <div style="width: 100%; height: 150px; background: black;" class="border border-1 mb-2" id="rgb"></div>
                <div class="d-flex">
                    <span>R</span>
                    <input value="0" max="250" class="form-range p-1" type="range" name="red" id="red" oninput="rgb.style.background = 'rgb(' + red.value + ','+ green.value+','+ blue.value+')',  red_s.textContent = red.value">
                </div>
                <div class="d-flex">
                    <span>G</span>
                    <input value="0" max="250" class="form-range p-1" type="range" name="green" id="green" oninput="rgb.style.background = 'rgb(' + red.value + ','+ green.value+','+ blue.value+')',  green_s.textContent = green.value">
                </div>
                <div class="d-flex">
                    <span>B</span>
                    <input value="0" max="250" class="form-range p-1" type="range" name="blue" id="blue" oninput="rgb.style.background = 'rgb(' + red.value + ','+ green.value+','+ blue.value+')',  blue_s.textContent = blue.value">
                </div>
                <div class="row">
                    <div class="d-flex h5 text-center justify-content-center">
                        <span>grb(</span><span id="red_s">0</span>,<span id="green_s">0</span>,<span id="blue_s">0</span>)
                    </div>
                </div>
            </div>
            <div class="col-lg-4 border border-2 p-3" style="height: 280px; width: 250px;">
                <div style="width: 100%; height: 150px; background: black;" class="border border-1 mb-2" id="hls"></div>
                <div class="d-flex">
                    <span>H</span>
                    <input value="0" max="100" class="form-range p-1" type="range" name="red" id="h_1" oninput="hls.style.background = 'hsl(' + h_1.value + ','+ h_2.value+'%,'+ h_3.value+'%)',  h1_s.textContent = h_1.value">
                </div>
                <div class="d-flex">
                    <span>L</span>
                    <input value="0" max="100" class="form-range p-1" type="range" name="green" id="h_2" oninput="hls.style.background = 'hsl(' + h_1.value + ','+ h_2.value+'%,'+ h_3.value+'%)',  h2_s.textContent = h_2.value + '%'">
                </div>
                <div class="d-flex">
                    <span>S</span>
                    <input value="0" max="100" class="form-range p-1" type="range" name="blue" id="h_3" oninput="hls.style.background = 'hsl(' + h_1.value + ','+ h_2.value+'%,'+ h_3.value+'%)',  h3_s.textContent = h_3.value + '%'">
                </div>
                <div class="row">
                    <div class="d-flex h5 text-center justify-content-center">
                        <span>hsl(</span><span id="h1_s">0</span>,<span id="h2_s">0</span>,<span id="h3_s">0</span>)
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- <div class="container">
        <input type="checkbox" name="" class="form-check-input" id="">
        <input type="datetime-local" name="" class="form-ra" id="">
    </div> -->
    <script src="./script.js"></script>
</body>

</html>
